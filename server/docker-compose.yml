services:
  postgres-service:
    container_name: postgres-service
    image: postgres:18-bookworm
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=$POSTGRES_DB
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_USER=$POSTGRES_USER
    volumes:
      - $PWD/out/pg_data:/var/lib/postgresql
    restart: always
    networks:
      - postgres-network


networks:
  postgres-network:
    driver: bridge
